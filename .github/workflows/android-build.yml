name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build Gradle
        working-directory: ./android
        run: chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Extract Keystore SHA1 and SHA256
        run: |
          KEYSTORE_PATH="${HOME}/.android/debug.keystore"
          
          if [ -f "$KEYSTORE_PATH" ]; then
            echo "=== Debug Keystore Found ==="
            echo "Extracting SHA1 Fingerprint..."
            keytool -list -v -keystore "$KEYSTORE_PATH" -alias androiddebugkey -storepass android -keypass android | grep "SHA1:" || echo "Could not extract SHA1"
            
            echo ""
            echo "Extracting SHA256 Fingerprint..."
            keytool -list -v -keystore "$KEYSTORE_PATH" -alias androiddebugkey -storepass android -keypass android | grep "SHA256:" || echo "Could not extract SHA256"
            
            echo ""
            echo "Full Keystore Details:"
            keytool -list -v -keystore "$KEYSTORE_PATH" -alias androiddebugkey -storepass android -keypass android
          else
            echo "Debug keystore not found at $KEYSTORE_PATH"
          fi

      - name: Extract SHA1 from Generated APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          
          if [ -f "$APK_PATH" ]; then
            echo "=== APK Signature Information ==="
            echo "APK Size: $(du -h "$APK_PATH" | cut -f1)"
            echo "APK Path: $APK_PATH"
            
            # Generate SHA1 hash of APK
            echo "APK SHA1: $(sha1sum "$APK_PATH")"
            echo "APK SHA256: $(sha256sum "$APK_PATH")"
          else
            echo "APK not found at $APK_PATH"
          fi

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Build Summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Build Status: ${{ job.status }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "=== Artifacts Ready ==="
          echo "APK: android/app/build/outputs/apk/debug/app-debug.apk"
