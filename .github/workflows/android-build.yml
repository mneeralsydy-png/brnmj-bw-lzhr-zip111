name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Verify Capacitor packages
        run: |
          echo "Checking Capacitor packages..."
          npm list @capacitor/core @capacitor/android @capacitor/cli
          echo "✅ Capacitor packages verified"

      - name: Sync Capacitor to Android
        run: |
          echo "Running Capacitor sync..."
          mkdir -p public
          cp -r client/public/* public/ || true
          # السطر التالي هو المفتاح: سيعيد بناء ملفات الأندرويد المفقودة تلقائياً
          npx cap add android || true 
          npx cap sync android
          echo "✅ Capacitor sync completed"

      - name: List Android native project
        working-directory: android
        run: |
          echo "Android project structure:"
          ls -la
          echo ""
          echo "Gradle wrapper:"
          ls -la | grep gradle
          
      - name: Build Android Debug APK
        working-directory: android
        run: |
          echo "Starting Gradle build..."
          # التأكد من وجود الـ wrapper وتفعيله
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug
          echo "✅ APK build completed"

      - name: Extract Keystore SHA1 and SHA256
        run: |
          KEYSTORE_PATH="${HOME}/.android/debug.keystore"
          echo "--- SHA1 Fingerprint ---"
          if [ -f "android/app/debug.keystore" ]; then
            keytool -list -v -keystore android/app/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep "SHA1:" || echo "⚠️ SHA1 not found"
          else
            echo "⚠️ Keystore not found yet"
          fi

      - name: Verify APK file
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK found at: $APK_PATH"
          else
            echo "❌ APK not found"
            find android -name "*.apk"
            exit 1
          fi

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "Build Status: ${{ job.status }}"
          echo "APK Output: android/app/build/outputs/apk/debug/app-debug.apk"
